<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title data-i18n="settingsTitle">Configuración Formulane</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-circle">Formulane</div>
      <h1 data-i18n="settingsHeader">CONFIGURACIÓN</h1>
    </header>

    <div class="settings-card">
      <h2 data-i18n="syncSection">Sincronización</h2>
      <div class="setting-row">
        <label>
          <strong data-i18n="refreshInterval">Intervalo de Refresco</strong>
          <small data-i18n="refreshDesc">Frecuencia de actualización de telemetría</small>
        </label>
        <div class="input-group">
          <input type="number" id="refreshInterval" min="1" max="60">
          <span data-i18n="minutes" style="font-size: 11px; opacity: 0.5; font-weight: 700;">MIN</span>
        </div>
      </div>
    </div>

    <div class="settings-card">
      <h2 data-i18n="displaySection">Visualización</h2>
      <div class="setting-row">
        <label>
          <strong data-i18n="driversOnScreen">Pilotos en Pantalla</strong>
          <small data-i18n="driversDesc">Cantidad de pilotos a mostrar en el podio</small>
        </label>
        <select id="driverCount">
          <option value="3">TOP 3</option>
          <option value="5">TOP 5</option>
          <option value="10">TOP 10</option>
        </select>
      </div>
    </div>

    <div class="settings-card">
      <h2 data-i18n="notificationsSection">Notificaciones</h2>
      <div class="setting-row">
        <label>
          <strong data-i18n="sessionStart">Inicio de Sesión</strong>
          <small data-i18n="sessionStartDesc">Avisar cuando una sesión pase a estar EN VIVO</small>
        </label>
        <label class="toggle">
          <input type="checkbox" id="notifySessionStart">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>
          <strong data-i18n="leaderChange">Cambio de Líder</strong>
          <small data-i18n="leaderChangeDesc">Avisar cuando el piloto en P1 sea adelantado</small>
        </label>
        <label class="toggle">
          <input type="checkbox" id="notifyLeaderChange">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>
          <strong data-i18n="trackIncidents">Incidentes (SC/VSC)</strong>
          <small data-i18n="trackIncidentsDesc">Avisar sobre Safety Car, VSC y Banderas Rojas</small>
        </label>
        <label class="toggle">
          <input type="checkbox" id="notifyTrackStatus">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <label>
          <strong data-i18n="raceControlAlerts">Dirección de Carrera</strong>
          <small data-i18n="raceControlDesc">Investigaciones, sanciones y DRS habilitado</small>
        </label>
        <label class="toggle">
          <input type="checkbox" id="notifyRaceControl">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="actions">
      <span id="status"></span>
      <button id="save" class="btn-primary" data-i18n="saveChanges">GUARDAR CAMBIOS</button>
    </div>

    <footer>
      <div class="footer-content">
        <span>FORMULANE &copy; 2026</span>
        <a href="https://github.com/marcmeru11/Formulane" target="_blank" class="repo-link">
          <svg viewBox="0 0 24 24" class="github-icon"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          <span data-i18n="viewRepo">View on GitHub</span>
        </a>
      </div>
    </footer>
  </div>
  <script src="options.js"></script>
</body>
</html>
