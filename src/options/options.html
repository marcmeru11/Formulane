<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <a href="https://github.com/marcmeru11/Formulane" target="_blank" class="github-side-tab">
        <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
        <span data-i18n="viewRepo">SOURCE CODE</span>
    </a>

    <div class="app-container">
        <header class="main-header">
            <div class="brand">
                <span class="logo-accent"></span>
                <h1>FORMULANE <small data-i18n="settingsHeader">CONTROL CENTER</small></h1>
            </div>
            <div class="version">v1.0</div>
        </header>

        <main class="content">
            <section class="config-card">
                <h2 class="section-title" data-i18n="syncSection">ENGINE SYNC</h2>
                <div class="input-row">
                    <div class="info">
                        <label data-i18n="refreshInterval">REFRESH INTERVAL</label>
                        <p data-i18n="refreshDesc">Frequency of telemetry updates from OpenF1</p>
                    </div>
                    <div class="control">
                        <input type="number" id="refreshInterval" min="1" max="60">
                        <span class="unit" data-i18n="minutes">MIN</span>
                    </div>
                </div>
            </section>

            <section class="config-card">
                <h2 class="section-title" data-i18n="displaySection">DATA DISPLAY</h2>
                <div class="input-row">
                    <div class="info">
                        <label data-i18n="driversOnScreen">PODIUM DEPTH</label>
                        <p data-i18n="driversDesc">Number of drivers displayed in the HUD</p>
                    </div>
                    <div class="control">
                        <select id="driverCount">
                            <option value="3">TOP 3</option>
                            <option value="5">TOP 5</option>
                            <option value="10">TOP 10</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="config-card">
                <h2 class="section-title" data-i18n="notificationsSection">ALERTS & BROADCAST</h2>
                <div class="toggle-grid">
                    <div class="toggle-item">
                        <label data-i18n="sessionStart">SESSION STATUS</label>
                        <input type="checkbox" id="notifySessionStart">
                    </div>
                    <div class="toggle-item">
                        <label data-i18n="leaderChange">LEADER CHANGES</label>
                        <input type="checkbox" id="notifyLeaderChange">
                    </div>
                    <div class="toggle-item">
                        <label data-i18n="trackIncidents">TRACK INCIDENTS</label>
                        <input type="checkbox" id="notifyTrackStatus">
                    </div>
                    <div class="toggle-item">
                        <label data-i18n="raceControlAlerts">RACE CONTROL</label>
                        <input type="checkbox" id="notifyRaceControl">
                    </div>
                </div>
            </section>

            <div class="action-zone">
                <button id="save" class="btn-save" data-i18n="saveChanges">APPLY CONFIGURATION</button>
                <div id="status" class="status-msg"></div>
            </div>
        </main>

        <footer class="main-footer">
            <p>By <strong>MarcMeRu</strong></p>
            <p>DATA POWERED BY <strong>OPENF1 API</strong> &copy; 2026</p>
        </footer>
    </div>
    <script src="options.js"></script>
</body>
</html>
